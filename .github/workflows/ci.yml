name: CI

# Quality gate only. Deploys are handled by Vercel's native Git integration
# (preview on PRs, production on push to the production branch) — same as the
# other DSG Vercel projects. Keep app health green here; Vercel ships it.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit + regression tests (with coverage gate)
        env:
          # Stripe TEST-MODE only (sk_test_.../price_...) — never live keys here, this runs
          # on every push/PR. Enables api/__tests__/checkout.integration.test.ts, a real
          # (unmocked) Stripe test-mode round trip; skips cleanly if unset. See
          # docs/adr/0002-stripe-test-mode-payment-gate.md.
          STRIPE_SECRET_KEY_TEST: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
          STRIPE_PRICE_ID_TEST: ${{ secrets.STRIPE_PRICE_ID_TEST }}
        run: npm run coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright, Chromium)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Archive build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
